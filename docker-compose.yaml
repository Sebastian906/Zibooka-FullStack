version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: zibooka-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: Zibooka

  zibooka-ml:
    build: ./ms-ml
    container_name: zibooka-ml
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: Zibooka
      LOG_LEVEL: INFO
    depends_on:
      - mongodb
    volumes:
      - ./ms-ml/models:/app/models

  zibooka-backend:
    build: ./server
    container_name: zibooka-backend
    image: 
        redis:7-alpine
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      ML_SERVICE_URL: http://zibooka-ml:5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mongodb
      - redis
  redis:
    image: redis:7-alpine
    container_name: zibooka-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data: